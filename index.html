  <link rel="stylesheet" href="styles/main.css">

<body>

      <h1 class="title">Оцените рост ваших инвестиций</h1>

        <div class="calc_image"></div>

          <div class="summa">

            <input type="number" name="" id="">

            <div class="label">Длительность, лет</div>

          <div class="balance">
            <div class="label">Результирующий баланс</div>
            <div class="result">12000</div>
          </div>
        </div>
      </div>
    </div>
  </div>
